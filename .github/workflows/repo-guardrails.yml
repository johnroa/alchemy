name: Repo Guardrails

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - "CLAUDE.md"
      - "README.md"
      - "codex.md"
      - "package.json"
      - ".gitignore"
      - "apps/admin/**"
      - "scripts/generate-admin-routes.mjs"
      - "scripts/check-repo-guardrails.mjs"
      - ".github/workflows/repo-guardrails.yml"
  push:
    branches:
      - main
    paths:
      - "AGENTS.md"
      - "CLAUDE.md"
      - "README.md"
      - "codex.md"
      - "package.json"
      - ".gitignore"
      - "apps/admin/**"
      - "scripts/generate-admin-routes.mjs"
      - "scripts/check-repo-guardrails.mjs"
      - ".github/workflows/repo-guardrails.yml"

jobs:
  guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check repo guardrails
        run: pnpm check:repo-guardrails

      - name: Lint admin app
        run: pnpm --filter @alchemy/admin lint
