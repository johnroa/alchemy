name: Alchemy
options:
  bundleIdPrefix: com.cookwithalchemy
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  Nuke:
    url: https://github.com/kean/Nuke
    from: "12.0.0"
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: "4.4.0"

targets:
  Alchemy:
    type: application
    platform: iOS
    sources:
      - path: Alchemy
    resources:
      - path: Alchemy/Resources
    configFiles:
      Debug: Configuration/Debug.xcconfig
      Release: Configuration/Release.xcconfig
    settings:
      base:
        INFOPLIST_FILE: Alchemy/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.cookwithalchemy.app
        "CODE_SIGN_ENTITLEMENTS[sdk=iphonesimulator*]": ""
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Nuke
        product: Nuke
      - package: Nuke
        product: NukeUI
      - package: Lottie
        product: Lottie
    entitlements:
      path: Alchemy/Resources/Alchemy.entitlements
      properties:
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.cookwithalchemy.app
