name: Alchemy
options:
  bundleIdPrefix: com.cookwithalchemy
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: false
    INFOPLIST_FILE: Alchemy/Resources/Info.plist
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

packages:
  Nuke:
    url: https://github.com/kean/Nuke
    from: "12.0.0"
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: "4.4.0"
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "9.1.0"

targets:
  Alchemy:
    type: application
    platform: iOS
    sources:
      - path: Alchemy
      - path: Shared
    resources:
      - path: Alchemy/Resources
    configFiles:
      Debug: Configuration/Debug.xcconfig
      Release: Configuration/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cookwithalchemy.app
    dependencies:
      - package: Nuke
        product: NukeUI
      - package: Lottie
      - package: Supabase
        product: Supabase
      - package: Sentry
      - target: AlchemyShareExtension
    entitlements:
      path: Alchemy/Resources/Alchemy.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.cookwithalchemy.shared

  AlchemyShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: AlchemyShareExtension
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cookwithalchemy.app.share-extension
        INFOPLIST_FILE: AlchemyShareExtension/Info.plist
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "6.0"
    entitlements:
      path: AlchemyShareExtension/AlchemyShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.cookwithalchemy.shared

  AlchemyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AlchemyTests
    dependencies:
      - target: Alchemy

schemes:
  Alchemy:
    build:
      targets:
        Alchemy: all
    test:
      targets:
        - AlchemyTests
    run:
      config: Debug
    archive:
      config: Release
