name: Alchemy
options:
  bundleIdPrefix: com.cookwithalchemy
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: false
    INFOPLIST_FILE: Alchemy/Resources/Info.plist
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

packages:
  Nuke:
    url: https://github.com/kean/Nuke
    from: "12.0.0"
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: "4.4.0"
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  Alchemy:
    type: application
    platform: iOS
    sources:
      - path: Alchemy
    resources:
      - path: Alchemy/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cookwithalchemy.app
      configs:
        Debug:
          xcconfig: Configuration/Debug.xcconfig
        Release:
          xcconfig: Configuration/Release.xcconfig
    dependencies:
      - package: Nuke
        product: NukeUI
      - package: Lottie
      - package: Supabase
        product: Supabase

schemes:
  Alchemy:
    build:
      targets:
        Alchemy: all
    run:
      config: Debug
    archive:
      config: Release
