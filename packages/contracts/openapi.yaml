            - $ref: '#/components/schemas/AssistantReply'
            - type: 'null'
        candidate_recipe_set:
          oneOf:
            - $ref: '#/components/schemas/CandidateRecipeSet'
            - type: 'null'
        response_context:
          oneOf:
            - $ref: '#/components/schemas/ChatResponseContext'
            - type: 'null'
        memory_context_ids:
          type: array
          items:
            type: string
            format: uuid
        context_version:
          type: integer
        ui_hints:
          type: object
          properties:
            show_generation_animation:
              type: boolean
            focus_component_id:
              type: string
        context:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Collection:
      type: object
      required: [id, name, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        created_at:
          type: string
          format: date-time
    GraphEntity:
      type: object
      required: [id, entity_type, label]
      properties:
        id:
          type: string
          format: uuid
        entity_type:
          type: string
        label:
          type: string
        metadata:
          type: object
          additionalProperties: true
    GraphEdge:
      type: object
      required: [id, from_entity_id, to_entity_id, relation_type, confidence, source]
      properties:
        id:
          type: string
          format: uuid
        from_entity_id:
          type: string
          format: uuid
        to_entity_id:
          type: string
          format: uuid
        relation_type:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        source:
          type: string
        metadata:
          type: object
          additionalProperties: true
        evidence_count:
          type: integer
        is_inferred:
          type: boolean
