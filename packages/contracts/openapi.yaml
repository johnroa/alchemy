openapi: 3.1.0
info:
  title: Alchemy API
  version: 1.2.0
  description: |
    API contract for Alchemy — an AI-driven recipe creation and management platform.
    Covers the user-facing v1 API at api.cookwithalchemy.com and the admin API at admin.cookwithalchemy.com.
servers:
  - url: https://api.cookwithalchemy.com/v1
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      summary: Health check
      security: []
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                type: object
                required: [status, service, timestamp, request_id]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  service:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
                  request_id:
                    type: string
        default:
          $ref: '#/components/responses/ErrorResponse'
  /recipes/{id}:
    get:
      summary: Get a recipe by id
      parameters:
        - $ref: '#/components/parameters/RecipeId'
        - in: query
          name: units
          required: false
          schema:
            type: string
            enum: [source, metric, imperial]
          description: Response projection for ingredient and inline measurement units.
        - in: query
          name: group_by
          required: false
          schema:
            type: string
            enum: [flat, category, component]
          description: Optional ingredient grouping strategy for response rendering.
        - in: query
          name: inline_measurements
          required: false
          schema:
            type: boolean
          description: Whether to append inline measurements directly inside step instructions.
      responses:
        '200':
          description: Recipe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recipe'
              examples:
                sourceFlat:
                  summary: Source units with flat ingredient list
                  value:
                    id: "0b123456-1111-2222-3333-444455556666"
                    title: "Weeknight Pasta"
                    servings: 4
                    ingredients:
                      - name: "Spaghetti"
                        amount: 12
                        unit: "oz"
                        ingredient_id: "11111111-2222-3333-4444-555555555555"
                        normalized_status: "normalized"
                      - name: "Olive Oil"
                        amount: 2
                        unit: "tbsp"
                        ingredient_id: "aaaa1111-2222-3333-4444-555555555555"
                        normalized_status: "normalized"
                        category: "Pantry"
                        component: "Sauce"
                    steps:
                      - index: 1
                        instruction: "Boil the pasta."
                    visibility: "public"
                    updated_at: "2026-03-03T12:00:00.000Z"
                metricComponentGrouped:
                  summary: Metric units with component grouping and inline measurements
                  value:
                    id: "0b123456-1111-2222-3333-444455556666"
                    title: "Weeknight Pasta"
                    servings: 4
                    ingredients:
                      - name: "Spaghetti"
                        amount: 340
                        unit: "g"
                        ingredient_id: "11111111-2222-3333-4444-555555555555"
                        normalized_status: "normalized"
                        component: "Pasta"
                      - name: "Tomato"
                        amount: 400
                        unit: "g"
                        ingredient_id: "bbbb1111-2222-3333-4444-555555555555"
                        normalized_status: "normalized"
                        component: "Sauce"
                    ingredient_groups:
                      - key: "pasta"
                        label: "Pasta"
                        ingredients:
                          - name: "Spaghetti"
                            amount: 340
                            unit: "g"
                            ingredient_id: "11111111-2222-3333-4444-555555555555"
                            normalized_status: "normalized"
                            component: "Pasta"
                    steps:
                      - index: 1
                        instruction: "Boil the pasta (Spaghetti: 340 g)"
                    visibility: "public"
                    updated_at: "2026-03-03T12:00:00.000Z"
        default:
          $ref: '#/components/responses/ErrorResponse'
  /recipes/{id}/history:
    get:
      summary: Get recipe version history with causal chat/thread context
      parameters:
        - $ref: '#/components/parameters/RecipeId'
      responses:
        '200':
          description: Recipe history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeHistoryResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /recipes/cookbook:
    get:
      summary: Saved cookbook recipes grouped with category precedence
      responses:
        '200':
          description: Cookbook response
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/RecipeCard'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /recipes/{id}/save:
    post:
      summary: Save a recipe to cookbook
      parameters:
        - $ref: '#/components/parameters/RecipeId'
      responses:
        '200':
          description: Save status
          content:
            application/json:
              schema:
                type: object
                required: [saved]
                properties:
                  saved:
                    type: boolean
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      summary: Unsave a recipe
      parameters:
        - $ref: '#/components/parameters/RecipeId'
      responses:
        '200':
          description: Save status
          content:
            application/json:
              schema:
                type: object
                required: [saved]
                properties:
                  saved:
                    type: boolean
        default:
          $ref: '#/components/responses/ErrorResponse'
  /recipes/{id}/attachments:
    post:
      summary: Create and attach a child recipe (side/appetizer/etc)
      parameters:
        - $ref: '#/components/parameters/RecipeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAttachmentRequest'
      responses:
        '200':
          description: Parent recipe with updated attachments
          content:
            application/json:
              schema:
                type: object
                required: [recipe, attachment_id]
                properties:
                  recipe:
                    $ref: '#/components/schemas/Recipe'
                  attachment_id:
                    type: string
                    format: uuid
        default:
          $ref: '#/components/responses/ErrorResponse'
  /recipes/{id}/attachments/{attachment_id}:
    patch:
      summary: Update attachment position or relation type
      parameters:
        - $ref: '#/components/parameters/RecipeId'
        - in: path
          name: attachment_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAttachmentRequest'
      responses:
        '200':
          description: Parent recipe with updated attachments
          content:
            application/json:
              schema:
                type: object
                required: [recipe]
                properties:
                  recipe:
                    $ref: '#/components/schemas/Recipe'
        default:
          $ref: '#/components/responses/ErrorResponse'
    delete:
      summary: Remove attachment link
      parameters:
        - $ref: '#/components/parameters/RecipeId'
        - in: path
          name: attachment_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Parent recipe with updated attachments
          content:
            application/json:
              schema:
                type: object
                required: [recipe]
                properties:
                  recipe:
                    $ref: '#/components/schemas/Recipe'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /collections:
    get:
      summary: List user collections
      responses:
        '200':
          description: Collections
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Collection'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      summary: Create collection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Created collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /collections/{id}/items:
    post:
      summary: Add recipe to collection
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recipe_id]
              properties:
                recipe_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Item add status
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        default:
          $ref: '#/components/responses/ErrorResponse'
  /preferences:
    get:
      summary: Get user preferences
      responses:
        '200':
          description: Preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreferenceProfile'
        default:
          $ref: '#/components/responses/ErrorResponse'
    patch:
      summary: Update user preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreferenceProfile'
      responses:
        '200':
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreferenceProfile'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /onboarding/state:
    get:
      summary: Get onboarding completion state for authenticated user
      responses:
        '200':
          description: Onboarding state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingState'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /onboarding/chat:
    post:
      summary: Continue onboarding interview and persist preference updates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingChatRequest'
      responses:
        '200':
          description: Onboarding assistant response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingChatResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /memories:
    get:
      summary: Get active user memories and snapshot
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Memory response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /memories/forget:
    post:
      summary: Soft-delete a specific memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [memory_id]
              properties:
                memory_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Forget status
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        default:
          $ref: '#/components/responses/ErrorResponse'
  /memories/reset:
    post:
      summary: Reset all user memories
      responses:
        '200':
          description: Reset status
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        default:
          $ref: '#/components/responses/ErrorResponse'
  /changelog:
    get:
      summary: User-scoped changelog timeline
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Changelog response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangelogResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /image-jobs/process:
    post:
      summary: Process pending image jobs for authenticated user
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
                  minimum: 1
                  maximum: 20
      responses:
        '200':
          description: Processing summary
          content:
            application/json:
              schema:
                type: object
                required: [processed, ready, failed, pending]
                properties:
                  processed:
                    type: integer
                  ready:
                    type: integer
                  failed:
                    type: integer
                  pending:
                    type: integer
        default:
          $ref: '#/components/responses/ErrorResponse'
  /metadata-jobs/process:
    post:
      summary: Process due recipe metadata jobs (internal authenticated scope)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
                  minimum: 0
                  maximum: 50
      responses:
        '200':
          description: Metadata queue processing summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetadataJobsProcessResponse'
              examples:
                processed:
                  value:
                    reaped: 1
                    claimed: 5
                    processed: 5
                    ready: 4
                    failed: 0
                    pending: 1
                    queue:
                      pending: 3
                      processing: 0
                      ready: 12
                      failed: 1
        default:
          $ref: '#/components/responses/ErrorResponse'
  /metadata-jobs/retry:
    post:
      summary: Re-queue a metadata job safely (internal authenticated scope)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [job_id]
              properties:
                job_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Retry status
          content:
            application/json:
              schema:
                type: object
                required: [ok, job]
                properties:
                  ok:
                    type: boolean
                  job:
                    type: object
                    required: [id, status, attempts, next_attempt_at]
                    properties:
                      id:
                        type: string
                        format: uuid
                      status:
                        type: string
                        enum: [pending, processing, ready, failed]
                      attempts:
                        type: integer
                      next_attempt_at:
                        type: string
                        format: date-time
        default:
          $ref: '#/components/responses/ErrorResponse'
  /metadata-jobs/recompute:
    post:
      summary: Recompute metadata for a recipe or recipe version (internal authenticated scope)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                recipe_id:
                  type: string
                  format: uuid
                recipe_version_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Recompute enqueue status
          content:
            application/json:
              schema:
                type: object
                required: [ok, recipe_id, recipe_version_id]
                properties:
                  ok:
                    type: boolean
                  recipe_id:
                    type: string
                    format: uuid
                  recipe_version_id:
                    type: string
                    format: uuid
        default:
          $ref: '#/components/responses/ErrorResponse'
  /memory-jobs/process:
    post:
      summary: Process due memory extraction jobs (internal authenticated scope)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
                  minimum: 1
                  maximum: 100
      responses:
        '200':
          description: Memory queue processing summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryJobsProcessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /memory-jobs/retry:
    post:
      summary: Re-queue a memory job safely (internal authenticated scope)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [job_id]
              properties:
                job_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Retry status
          content:
            application/json:
              schema:
                type: object
                required: [ok, job]
                properties:
                  ok:
                    type: boolean
                  job:
                    type: object
                    required: [id, status, attempts, next_attempt_at]
                    properties:
                      id:
                        type: string
                        format: uuid
                      status:
                        type: string
                        enum: [pending, processing, ready, failed]
                      attempts:
                        type: integer
                      next_attempt_at:
                        type: string
                        format: date-time
        default:
          $ref: '#/components/responses/ErrorResponse'
  /chat:
    post:
      summary: Start a new chat session
      parameters:
        - $ref: '#/components/parameters/SimModelOverrides'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
      responses:
        '200':
          description: Chat session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSession'
              examples:
                ideation:
                  summary: Ideation response without candidate set
                  value:
                    id: "e3fa8890-1111-2222-3333-444455556666"
                    loop_state: "ideation"
                    assistant_reply:
                      text: "Do you want this to be creamy or tomato-forward?"
                    response_context:
                      intent: "in_scope_ideation"
                      mode: "ideation"
                    messages: []
                    candidate_recipe_set: null
                    memory_context_ids: ["f2f3a1f0-1111-2222-3333-444455556666"]
                    context_version: 2
                outOfScope:
                  summary: Out-of-scope ask is refused and redirected to cooking
                  value:
                    id: "e3fa8890-1111-2222-3333-444455556666"
                    loop_state: "ideation"
                    assistant_reply:
                      text: "I can’t help with that here. I can help with recipes or cooking techniques."
                    response_context:
                      intent: "out_of_scope"
                      mode: "ideation"
                    messages: []
                    candidate_recipe_set: null
                    memory_context_ids: []
                    context_version: 2
        default:
          $ref: '#/components/responses/ErrorResponse'
  /chat/{id}:
    get:
      summary: Get chat session thread
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Chat session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSession'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /chat/{id}/messages:
    post:
      summary: Add a message to chat session thread
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/SimModelOverrides'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
      responses:
        '200':
          description: Updated chat session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSession'
              examples:
                triggeredGeneration:
                  summary: Assistant triggered candidate recipe set
                  value:
                    id: "e3fa8890-1111-2222-3333-444455556666"
                    loop_state: "candidate_presented"
                    assistant_reply:
                      text: "Here are two options to start from."
                    response_context:
                      intent: "in_scope_generate"
                      mode: "generation"
                    candidate_recipe_set:
                      candidate_id: "8f32d780-1111-2222-3333-444455556666"
                      revision: 1
                      active_component_id: "component-main"
                      components:
                        - component_id: "component-main"
                          role: "main"
                          title: "Spicy Chicken Parm"
                          recipe:
                            title: "Spicy Chicken Parm"
                            servings: 2
                            ingredients: []
                            steps: []
                        - component_id: "component-side"
                          role: "side"
                          title: "Garlicky Broccolini"
                          recipe:
                            title: "Garlicky Broccolini"
                            servings: 2
                            ingredients: []
                            steps: []
                    messages: []
                    memory_context_ids: []
                    context_version: 2
                    ui_hints:
                      show_generation_animation: true
                      focus_component_id: "component-main"
                iterate:
                  summary: Candidate set updated after tweak
                  value:
                    id: "e3fa8890-1111-2222-3333-444455556666"
                    loop_state: "candidate_presented"
                    assistant_reply:
                      text: "Updated with a lighter breading and shorter timing."
                    response_context:
                      intent: "in_scope_generate"
                      mode: "iteration"
                    candidate_recipe_set:
                      candidate_id: "8f32d780-1111-2222-3333-444455556666"
                      revision: 2
                      active_component_id: "component-main"
                      components:
                        - component_id: "component-main"
                          role: "main"
                          title: "Lighter Spicy Chicken Parm"
                          recipe:
                            title: "Lighter Spicy Chicken Parm"
                            servings: 2
                            ingredients: []
                            steps: []
                    messages: []
                    memory_context_ids: []
                    context_version: 2
        default:
          description: Error envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                generationMissingCandidate:
                  summary: Trigger said generate but no candidate was returned
                  value:
                    code: "chat_generation_missing_candidate"
                    message: "Generation trigger did not produce a candidate recipe set"
                    request_id: "7b8d4f00-1111-2222-3333-444455556666"
                invalidJson:
                  summary: Model returned invalid JSON in generation scope
                  value:
                    code: "llm_invalid_json"
                    message: "LLM output is not valid JSON"
                    details: "{ \"assistant_reply\": { \"text\": \"...\" }"
                    request_id: "1cb9f9dd-1111-2222-3333-444455556666"
  /chat/{id}/candidate:
    patch:
      summary: Mutate ephemeral candidate recipe set state for a chat session
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/SimModelOverrides'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchCandidateRequest'
            examples:
              setActiveComponent:
                summary: Set active tab
                value:
                  action: "set_active_component"
                  component_id: "component-side"
              deleteComponent:
                summary: Remove an extra tab before commit
                value:
                  action: "delete_component"
                  component_id: "component-side"
              clearCandidate:
                summary: Clear candidate set and return to ideation mode
                value:
                  action: "clear_candidate"
      responses:
        '200':
          description: Updated chat session candidate set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatchCandidateResponse'
              examples:
                candidateUpdated:
                  summary: Candidate still present
                  value:
                    id: "e3fa8890-1111-2222-3333-444455556666"
                    loop_state: "candidate_presented"
                    assistant_reply:
                      text: "Updated the active tab."
                    candidate_recipe_set:
                      candidate_id: "8f32d780-1111-2222-3333-444455556666"
                      revision: 3
                      active_component_id: "component-side"
                      components:
                        - component_id: "component-main"
                          role: "main"
                          title: "Lighter Spicy Chicken Parm"
                          recipe:
                            title: "Lighter Spicy Chicken Parm"
                            servings: 2
                            ingredients: []
                            steps: []
                        - component_id: "component-side"
                          role: "side"
                          title: "Garlicky Broccolini"
                          recipe:
                            title: "Garlicky Broccolini"
                            servings: 2
                            ingredients: []
                            steps: []
                    messages: []
                    memory_context_ids: []
                    context_version: 2
                    ui_hints:
                      focus_component_id: "component-side"
                candidateCleared:
                  summary: Candidate cleared, back to ideation
                  value:
                    id: "e3fa8890-1111-2222-3333-444455556666"
                    loop_state: "ideation"
                    assistant_reply:
                      text: "Ready for a fresh start."
                    candidate_recipe_set: null
                    messages: []
                    memory_context_ids: []
                    context_version: 2
        default:
          $ref: '#/components/responses/ErrorResponse'
  /chat/{id}/commit:
    post:
      summary: Persist all remaining candidate components to cookbook
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/SimModelOverrides'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommitChatRecipesRequest'
            examples:
              default:
                value: {}
