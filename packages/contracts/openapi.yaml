components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    RecipeId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    IngredientId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    SimModelOverrides:
      in: header
      name: x-sim-model-overrides
      required: false
      schema:
        type: string
      description: |
        Optional JSON string used by Admin Simulation Runner to override model/provider per scope.
        Format:
        {
          "chat_ideation":{"provider":"anthropic","model":"claude-3-5-haiku-latest"},
          "ingredient_enrich":{"provider":"openai","model":"gpt-5-mini"}
        }
        Common scope keys:
        chat_ideation, chat_generation, chat_iteration, classify,
        ingredient_alias_normalize, ingredient_phrase_split, ingredient_enrich,
        recipe_metadata_enrich, ingredient_relation_infer, preference_normalize, equipment_filter,
        onboarding, image, memory_extract, memory_select, memory_summarize, memory_conflict_resolve.
        Not required for normal mobile clients.
  responses:
    ErrorResponse:
      description: Error envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    LlmScope:
      type: string
      description: Internal LLM pipeline scope key used for prompt/rule/model routing.
      enum:
        - chat
        - chat_ideation
        - chat_generation
        - chat_iteration
        - generate
        - tweak
        - classify
        - ingredient_alias_normalize
        - ingredient_phrase_split
        - ingredient_enrich
        - recipe_metadata_enrich
        - ingredient_relation_infer
        - preference_normalize
        - equipment_filter
        - onboarding
        - image
        - memory_extract
        - memory_select
        - memory_summarize
        - memory_conflict_resolve
    ErrorEnvelope:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          type: string
        message:
          type: string
        details: {}
        request_id:
          type: string
    Ingredient:
      type: object
      required: [name, amount, unit]
      properties:
        name:
          type: string
        amount:
          type: number
        unit:
          type: string
        preparation:
          type: string
        category:
          type: string
        ingredient_id:
          type: [string, 'null']
          format: uuid
        normalized_status:
          type: string
          enum: [normalized, needs_retry]
        component:
          type: [string, 'null']
    IngredientGroup:
      type: object
      required: [key, label, ingredients]
      properties:
        key:
          type: string
        label:
          type: string
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/Ingredient'
    InlineMeasurement:
      type: object
      required: [ingredient, amount, unit]
      properties:
        ingredient:
          type: string
        amount:
          type: number
        unit:
          type: string
    Step:
      type: object
      required: [index, instruction]
      properties:
        index:
          type: integer
        instruction:
          type: string
        timer_seconds:
          type: integer
        notes:
          type: string
        inline_measurements:
          type: array
          items:
            $ref: '#/components/schemas/InlineMeasurement'
    Nutrition:
      type: object
      properties:
        calories:
          type: number
        protein_g:
          type: number
        carbs_g:
          type: number
        fat_g:
          type: number
        fiber_g:
          type: number
        sugar_g:
          type: number
        sodium_mg:
          type: number
    RecipeMetadata:
